flight_task:
  description: >
    Search for available flights from {from_city}"
        "to {destination_city}. "
        "Provide flight options including departure/arrival times and compare them to {date_from} and {date_to}, that the traveller wishes to travel, airlines, duration, and prices
  expected_output: >
    "In markdown format:A detailed markdown report a list of flight options with details like airline name, flight number, departure/arrival times, duration, and price."
  agent: flight_Agent
#  tools: [google_flights_tool]

accommodation_task:
  description: >
    "Based on the users {accomodation_style},{budget},{interests} Find and recommend accommodation options in {destination_city} "
        "Include ratings and approximate costs."
  expected_output: >
    "A curated markdown report of accommodation options with name, type, location, price range, and guest ratings."
  agent: accommodation_Agent
#  tools: [airbnb_search_tool,       hotels_com_get_regions]

itinerary_task:
  description: >
    "Based on the users {interests}, create a detailed markdown report on daily itinerary for a trip to {destination_city} including must-see attractions, activities, "
        "meal recommendations, and estimated time allocation per activity and based on their {interests}, if there is need for prior bookings, provide booking info."
  expected_output: >
    "A day-by-day markdown report of itinerary with timings, places to visit, activity descriptions, and dining options."
  agent: itinerary_Agent
#  tools: [generate_daily_itinerary_schedule]

local_info_task:
  description: >
   "Based on the users {interests} and {budget} Provide a markdown report  essential local travel information for Kenya including current currency exchange rates, weather forecasts, "
        "safety advisories, and cultural tips.
  expected_output: >
    "A markdown report for a  comprehensive local travel guide containing currency details, weather summary for the trip dates, "
        "safety notices, and important cultural etiquette to familiarize the user to the local inhabitance and destinations."
  agent: local_info_Agent
#  tools : [get_weather_forecast,get_currency_exchange,get_local_events,get_cultural_tips]

budget_task:
  description: >
    Based on the user's:
        From City: {from_city}
        Destination City: {destination_city}
        Departure Date: {date_from}
        Return Date: {date_to}
        Interests: {interests}
        Accomodation:{accomodation_style}
        Pace of travel:{pace of travel}
        Transport:{transport}
        Number of people to bring along:{number of people to bring along}
        Must do:{must_do}
        Budget: {budget}
    Estimate the overall trip budget by calculating expected expenses for flights, accommodation, food, transportation, and activities. Provide an expense tracking markdown report.
    """
  expected_output: >
    "A detailed budget estimation markdown report including cost breakdown and a tracking sheet for actual expenses."
  agent: budget_Agent
#  tools : [convert_currency,get_currency_exchange]

planner_task:
  description: >
   This task synthesizes all collected information: 
    {from_city}
    {destination_city}
    {date_from}
    {date_to}
    {interests}
    {accomodation_style}
    {pace of travel}
    {transport}
    {number of people to bring along}
    {must_do}
    {anything_to_avoid}
    {budget}
     into a detailed markdown report
  expected_output: >
   A rich markdown document with emojis on each title and subtitle, that:
    in markdown format:
    Gives the estimated travel time from city of origin {from_city} to destination {destination_city},
    The suggested places based on their {interests}, estimated costs based on the itinerary that can fit their budget.
    """,
  agent: planner_Agent
#  tools : [google_flights_tool,airbnb_search_tool,hotels_com_get_regions,generate_daily_itinerary_schedule,get_weather_forecast,get_currency_exchange,get_local_events,get_cultural_tips]